<svg width="128" height="128" xmlns="http://www.w3.org/2000/svg">
  <!-- 运营管理图标 - 简洁的仪表盘/图表风格 -->
  <!-- 外圆环 -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="#909399" stroke-width="8"/>
  
  <!-- 内部仪表盘刻度 -->
  <path d="M64 20 L64 28" stroke="#C0C4CC" stroke-width="4" stroke-linecap="round"/>
  <path d="M64 100 L64 108" stroke="#C0C4CC" stroke-width="4" stroke-linecap="round"/>
  <path d="M20 64 L28 64" stroke="#C0C4CC" stroke-width="4" stroke-linecap="round"/>
  <path d="M100 64 L108 64" stroke="#C0C4CC" stroke-width="4" stroke-linecap="round"/>
  
  <!-- 上升折线 - 更粗更明显 -->
  <polyline points="32,76 48,60 64,68 80,52 96,36" 
            fill="none" 
            stroke="#409EFF" 
            stroke-width="8" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
  
  <!-- 数据点 -->
  <circle cx="48" cy="60" r="6" fill="#409EFF"/>
  <circle cx="64" cy="68" r="6" fill="#409EFF"/>
  <circle cx="80" cy="52" r="6" fill="#409EFF"/>
  <circle cx="96" cy="36" r="6" fill="#67C23A"/>
  
  <!-- 中心点 -->
  <circle cx="64" cy="64" r="8" fill="#606266"/>
</svg>